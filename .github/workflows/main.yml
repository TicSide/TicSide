name: Metrics - Estadísticas Completas

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Generar todo
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: metrics.completo.svg
          base: ""
          
          # Calendario de commits
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Lenguajes más usados
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_details: percentage, bytes-size
          plugin_languages_ignored: html, css  # Ignora HTML y CSS si quieres
          
          # Detalles adicionales opcionales
          plugin_lines: yes  # Muestra líneas de código